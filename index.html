<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekaant AI Typing System</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #eef2f7;
}

header {
  background: linear-gradient(135deg, #0d6efd, #6610f2);
  color: white;
  padding: 30px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  background: linear-gradient(135deg, #0d6efd, #6610f2);
  color: white;
  border: none;
  padding: 12px 18px;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

textarea {
  width: 100%;
  height: 150px;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

input {
  margin-top: 10px;
}

.footer {
  text-align: center;
  padding: 15px;
  background: #111;
  color: white;
  margin-top: 30px;
}
</style>
</head>

<body>

<header>
  <h1>🚀 Ekaant AI Typing System</h1>
  <p>तेज • सटीक • विश्वसनीय</p>
</header>

<div class="container">

  <div class="card">
    <h2>🎤 Voice Typing</h2>
    <button onclick="startVoice()">Start Speaking</button>
    <textarea id="voiceOutput" placeholder="यहाँ टेक्स्ट आएगा..."></textarea>
  </div>

  <div class="card">
    <h2>📷 Image to Text</h2>
    <input type="file">
    <p>जल्द ही यह feature लाइव होगा</p>
  </div>

</div>

<div class="footer">
  © 2026 Ekaant International AI Typing System
</div>

<script>
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "hi-IN";

  recognition.onresult = function(event) {
    document.getElementById("voiceOutput").value = event.results[0][0].transcript;
  };

  recognition.start();
}
</script>

</body>
</html>
